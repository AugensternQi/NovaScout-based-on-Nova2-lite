<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopSense AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-w-[360px] bg-slate-50 text-slate-800">
    <main class="p-5">
      <header class="mb-5">
        <h1 class="text-xl font-bold tracking-tight text-indigo-600">ShopSense AI</h1>
        <p class="mt-1 text-xs text-slate-500">Instant AI summary for a mock product.</p>
      </header>

      <button
        id="summarizeBtn"
        class="w-full rounded-xl bg-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow transition hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1"
      >
        Summarize Mock Product
      </button>

      <div
        id="loadingSpinner"
        class="mt-4 hidden items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-600"
      >
        <span class="h-4 w-4 animate-spin rounded-full border-2 border-slate-300 border-t-indigo-600"></span>
        <span>Generating summary...</span>
      </div>

      <section class="mt-4">
        <div
          id="result"
          class="min-h-20 rounded-xl border border-slate-200 bg-white p-4 text-sm leading-relaxed text-slate-700"
        >
          Click "Summarize Mock Product" to see the AI response.
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
